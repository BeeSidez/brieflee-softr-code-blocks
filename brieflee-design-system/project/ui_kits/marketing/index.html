<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Brieflee — Spell check for video</title>
  <link rel="icon" href="../../assets/logos/app-icon.png">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style> body { margin: 0; } </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="LogoStrip.jsx"></script>
  <script type="text/babel" src="FeatureGrid.jsx"></script>
  <script type="text/babel" src="FeatureRow.jsx"></script>
  <script type="text/babel" src="Stats.jsx"></script>
  <script type="text/babel" src="CTA.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [trial, setTrial] = useState(false);
      const start = () => setTrial(true);
      return (
        <div data-screen-label="Brieflee marketing home">
          <Nav trialActive={trial} onTrialClick={start} />
          <Hero onPrimary={start} />
          <LogoStrip />
          <FeatureGrid />
          <FeatureRow />
          <FeatureRow flip />
          <Stats />
          <CTA />
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
