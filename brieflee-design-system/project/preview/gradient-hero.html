<!doctype html><html><head><meta charset="utf-8"><title>Hero gradient</title><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:0;background:var(--bl-page);font-family:var(--bl-font-sans)}.hero{height:200px;background:linear-gradient(180deg,#ecf0ff 0%,#879cf7 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}.pill{background:#879cf7;color:#fff;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:6px 14px;border-radius:999px;box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}.hl{color:#001364;font-size:32px;font-weight:800;letter-spacing:-.02em;line-height:1.05;text-align:center}.lab{position:absolute;bottom:8px;left:12px;font-family:var(--bl-font-mono);font-size:10px;color:#001364;opacity:.6}</style></head><body style="position:relative"><div class="hero"><div class="pill">Spell check for video</div><div class="hl">#ECF0FF → #879CF7</div></div><div class="lab">linear-gradient(180deg, container → canon-periwinkle)</div></body></html>
