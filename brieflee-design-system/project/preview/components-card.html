<!doctype html><html><head><meta charset="utf-8"><title>Card</title><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bl-page);font-family:var(--bl-font-sans)}.card{background:#fff;border:1px solid #d6defc;border-radius:16px;padding:18px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 3px rgba(0,19,100,.06)}.thumb{width:64px;height:96px;border-radius:10px;background:linear-gradient(135deg,#ecf0ff,#879cf7);flex-shrink:0;display:flex;align-items:center;justify-content:center}.thumb svg{width:24px;height:24px;color:#fff}h4{margin:0 0 4px;font-size:16px;color:#001364;font-weight:700}.meta{font-size:12px;color:#555}.score{margin-left:auto;text-align:right}.score b{display:block;font-size:24px;color:#294ff6;font-weight:800;line-height:1}.score s{display:block;text-decoration:none;font-size:11px;color:#555;margin-top:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}.tag{display:inline-flex;align-items:center;gap:4px;background:#f0fff4;color:#166534;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;margin-top:6px}.tag .dot{width:6px;height:6px;border-radius:999px;background:#38a169}</style></head><body><div class="card"><div class="thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="6 4 20 12 6 20 6 4" fill="currentColor"/></svg></div><div><h4>Cassie Avery · matcha morning routine</h4><div class="meta">TikTok · 0:46 · uploaded 2h ago</div><span class="tag"><span class="dot"></span>High quality · approved</span></div><div class="score"><b>92</b><s>brief score</s></div></div></body></html>
