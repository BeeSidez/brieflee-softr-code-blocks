<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:18px;background:var(--bl-page);font-family:var(--bl-font-sans)}.row{display:flex;align-items:flex-end;gap:18px}.s{display:flex;flex-direction:column;align-items:center;gap:6px}.bar{background:linear-gradient(180deg,#7a93ff,#294ff6);border-radius:4px;width:18px}.l{font-family:var(--bl-font-mono);font-size:10px;color:var(--bl-fg-muted)}</style></head><body><div class="row"><div class="s"><div class="bar" style="height:4px"></div><div class="l">1·4</div></div><div class="s"><div class="bar" style="height:8px"></div><div class="l">2·8</div></div><div class="s"><div class="bar" style="height:12px"></div><div class="l">3·12</div></div><div class="s"><div class="bar" style="height:16px"></div><div class="l">4·16</div></div><div class="s"><div class="bar" style="height:24px"></div><div class="l">6·24</div></div><div class="s"><div class="bar" style="height:32px"></div><div class="l">8·32</div></div><div class="s"><div class="bar" style="height:48px"></div><div class="l">12·48</div></div><div class="s"><div class="bar" style="height:64px"></div><div class="l">16·64</div></div><div class="s"><div class="bar" style="height:96px"></div><div class="l">24·96</div></div></div></body></html>
