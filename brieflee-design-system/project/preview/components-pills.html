<!doctype html><html><head><meta charset="utf-8"><title>Pills</title><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bl-page);font-family:var(--bl-font-sans);display:flex;flex-direction:column;gap:14px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;line-height:1}.eb{background:#879cf7;color:#fff;text-transform:uppercase;letter-spacing:.08em;font-size:11px;padding:6px 14px}.soft{background:#d9e0ff;color:#294ff6}.sec{background:#eef4fd;color:#001364}.ok{background:#f0fff4;color:#166534;border:1px solid #bbf7d0}.warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a}.bad{background:#fff1f2;color:#e63946;border:1px solid #ffd6d9}.muted{background:#f1f5f9;color:#64748b}.dot{width:6px;height:6px;border-radius:999px;background:currentColor}.l{font-size:10px;color:var(--bl-fg-muted);font-family:var(--bl-font-mono)}</style></head><body><div><div class="l" style="margin-bottom:6px">Eyebrow · soft · secondary</div><div class="row"><span class="pill eb">Spell check for video</span><span class="pill soft">High quality</span><span class="pill sec">Reviewed</span></div></div><div><div class="l" style="margin-bottom:6px">Status badges</div><div class="row"><span class="pill ok"><span class="dot"></span>Approved</span><span class="pill warn"><span class="dot"></span>Pending</span><span class="pill bad"><span class="dot"></span>Rejected</span><span class="pill muted">Draft</span></div></div></body></html>
