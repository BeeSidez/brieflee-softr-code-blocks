<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bl-page);font-family:var(--bl-font-sans);display:flex;flex-direction:column;gap:14px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;border:none;font-family:inherit;transition:all .2s}.primary{background:#879cf7;color:#fff;box-shadow:0 1px 3px rgba(41,79,246,.18),inset 0 1px 0 rgba(255,255,255,.3)}.primary:hover{background:#7a93ff}.dark{background:#000f4d;color:#fff}.outline{background:transparent;color:#001364;border:1.5px solid #d6defc}.outline:hover{background:#f8fbff}.ghost{background:transparent;color:#294ff6}.ghost:hover{background:rgba(41,79,246,.06)}.destructive{background:#fff1f2;color:#e63946;border:1px solid #ffd6d9}svg{width:14px;height:14px}.l{font-size:10px;color:var(--bl-fg-muted);font-family:var(--bl-font-mono)}</style></head><body><div><div class="l" style="margin-bottom:6px">Primary &amp; dark CTAs</div><div class="row"><button class="btn primary">Try free for 14 days <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button><button class="btn dark">Watch demo</button></div></div><div><div class="l" style="margin-bottom:6px">Outline · ghost · destructive</div><div class="row"><button class="btn outline">Back</button><button class="btn ghost">Continue</button><button class="btn destructive">Reject</button></div></div></body></html>
