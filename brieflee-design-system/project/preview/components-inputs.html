<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bl-page);font-family:var(--bl-font-sans);display:flex;flex-direction:column;gap:12px}label{font-size:12px;color:var(--bl-fg);font-weight:500;display:block;margin-bottom:4px}.in,.sel{width:100%;border:1.5px solid #d6defc;border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--bl-fg);background:#fff;outline:none}.in:focus,.sel:focus{border-color:#879cf7;box-shadow:0 0 0 4px rgba(135,156,247,.20)}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.sel{display:flex;justify-content:space-between;align-items:center;cursor:pointer;color:var(--bl-fg-muted)}.search{position:relative}.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#7a93ff}.search .in{padding-left:36px}</style></head><body><div class="row"><div><label>Brief name</label><input class="in" value="Spring matcha launch"></div><div><label>Platform</label><div class="sel">TikTok <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div></div></div><div class="search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input class="in" placeholder="Search creators, briefs, videos..."></div></body></html>
