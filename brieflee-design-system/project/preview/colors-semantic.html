<!doctype html><html><head><meta charset="utf-8"><title>Semantic</title><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bl-page);font-family:var(--bl-font-sans)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.s{border-radius:12px;height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-size:11px;line-height:1.3;border:1px solid var(--bl-border)}.s b{display:block;font-weight:700;font-size:12px}.s code{font-family:var(--bl-font-mono);font-size:10px;opacity:.75}</style></head><body><div class="grid"><div class="s" style="background:#38a169;color:#fff;border-color:#38a169"><b>Success</b><code>#38A169</code></div><div class="s" style="background:#f0fff4;color:#166534"><b>Success bg</b><code>#F0FFF4</code></div><div class="s" style="background:#e63946;color:#fff;border-color:#e63946"><b>Danger</b><code>#E63946</code></div><div class="s" style="background:#f59e0b;color:#fff;border-color:#f59e0b"><b>Warn</b><code>#F59E0B</code></div></div></body></html>
