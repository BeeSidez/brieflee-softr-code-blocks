<!doctype html><html><head><meta charset="utf-8"><title>Score</title><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--bl-page);font-family:var(--bl-font-sans);display:flex;align-items:center;justify-content:center;gap:24px}.donut{width:108px;height:108px;border-radius:999px;background:conic-gradient(#294ff6 0 92%,#eef4fd 92% 100%);display:flex;align-items:center;justify-content:center;position:relative}.donut::after{content:"";position:absolute;inset:11px;background:#fff;border-radius:999px}.dn-val{position:relative;z-index:1;font-size:28px;font-weight:800;color:#001364;line-height:1}.dn-lab{position:relative;z-index:1;font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:2px}.legend{display:flex;flex-direction:column;gap:8px}.li{display:flex;align-items:center;gap:8px;font-size:13px;color:#001364}.bar{width:120px;height:6px;border-radius:999px;background:#eef4fd;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#7a93ff,#294ff6)}.k{font-size:11px;color:#555;width:80px}.v{font-weight:700;font-size:12px;color:#294ff6}</style></head><body><div class="donut"><div style="text-align:center;position:relative;z-index:1"><div class="dn-val">92</div><div class="dn-lab">brief score</div></div></div><div class="legend"><div class="li"><span class="k">Hook</span><span class="bar"><span class="fill" style="width:96%"></span></span><span class="v">96</span></div><div class="li"><span class="k">Audio</span><span class="bar"><span class="fill" style="width:88%"></span></span><span class="v">88</span></div><div class="li"><span class="k">Brand</span><span class="bar"><span class="fill" style="width:91%"></span></span><span class="v">91</span></div></div></body></html>
