<!doctype html><html><head><meta charset="utf-8"><title>Shadow</title><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:32px;background:var(--bl-page);font-family:var(--bl-font-sans)}.row{display:flex;gap:32px;align-items:center;justify-content:space-around}.tile{background:#fff;width:120px;height:88px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--bl-fg);font-weight:600;font-size:12px}.l{font-family:var(--bl-font-mono);font-size:10px;color:var(--bl-fg-muted);margin-top:8px;text-align:center}</style></head><body><div class="row"><div><div class="tile" style="box-shadow:var(--bl-shadow-xs)">xs</div><div class="l">shadow-xs</div></div><div><div class="tile" style="box-shadow:var(--bl-shadow-sm)">sm</div><div class="l">shadow-sm</div></div><div><div class="tile" style="box-shadow:var(--bl-shadow)">base</div><div class="l">shadow</div></div><div><div class="tile" style="box-shadow:var(--bl-shadow-lg)">lg</div><div class="l">shadow-lg</div></div></div></body></html>
